<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  <!-- Microphone Icon -->
  <g fill="white">
    <!-- Mic body -->
    <rect x="200" y="120" width="112" height="180" rx="56" ry="56"/>
    <!-- Mic stand arc -->
    <path d="M160 280 A96 96 0 0 0 352 280" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Mic stand vertical -->
    <line x1="256" y1="376" x2="256" y2="420" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Mic base -->
    <line x1="196" y1="420" x2="316" y2="420" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Checkmark -->
    <path d="M340 160 L370 190 L420 120" fill="none" stroke="#10b981" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
