        let fullTranscript = '';
        const SILENCE_TIMEOUT = 2000; // 2 segundos de silencio para finalizar

        // Stream de audio persistente - se inicializa UNA SOLA VEZ
        let audioStream = null;
        let microphoneInitialized = false;

        /**
         * Inicializa el micrófono UNA SOLA VEZ y reutiliza el stream
         * @returns {Promise<MediaStream|null>} Stream de audio o null si falla
         */
        async function initMicrophone() {
            // Si ya tenemos el stream, reutilizarlo
            if (audioStream && audioStream.active) {
                return audioStream;
            }

            try {
                // Verificar estado del permiso usando Permissions API
                if (navigator.permissions && navigator.permissions.query) {
                    try {
                        const permission = await navigator.permissions.query({ name: 'microphone' });

                        if (permission.state === 'denied') {
                            mostrarToast('El acceso al micrófono está bloqueado. Habilítelo desde la configuración del navegador.', 'error');
                            return null;
                        }

                        // Si ya está granted, obtener stream sin mostrar prompt
                        if (permission.state === 'granted') {
                            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            microphoneInitialized = true;
                            return audioStream;
                        }
                    } catch (permErr) {
                        // Permissions API no soportada, continuar con getUserMedia
                    }
                }

                // Primera vez o estado 'prompt' - solicitar permiso
                // Aprovechar gesto de usuario para pedir también notificaciones
                solicitarPermisoNotificaciones().catch(e => console.log('Error pidiendo notificaciones:', e));

                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphoneInitialized = true;

                mostrarToast('✅ Micrófono activado', 'success');

                return audioStream;

            } catch (error) {
                console.error('Error al inicializar el micrófono:', error);

                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    mostrarToast('El acceso al micrófono fue denegado. Habilítelo desde la configuración del navegador.', 'error');
                } else if (error.name === 'NotFoundError') {
                    mostrarToast('No se detectó ningún micrófono en su equipo.', 'error');
                } else {
                    mostrarToast('Error al acceder al micrófono', 'error');
                }

                return null;
            }
        }

        /**
         * Inicia la grabación reutilizando el stream existente
         */
        async function startRecording() {
            // Inicializar micrófono si no está listo (solo pide permiso la primera vez)
            if (!audioStream || !audioStream.active) {
                const stream = await initMicrophone();
                if (!stream) return false;
            }

            // Stream listo, iniciar reconocimiento (MediaRecorder)
            return true;
        }

        /**
         * Verifica el estado del micrófono al cargar la página
         */
        async function checkMicrophoneStatus() {
            if (navigator.permissions && navigator.permissions.query) {
                try {
                    const permission = await navigator.permissions.query({ name: 'microphone' });

                    if (permission.state === 'granted') {
                        // Pre-inicializar el stream en segundo plano
                        initMicrophone().catch(() => { });
                    } else if (permission.state === 'denied') {
                        mostrarToast('Micrófono bloqueado. Habilítelo en configuración del navegador.', 'warning');
                    }

                    // Escuchar cambios en el permiso
                    permission.addEventListener('change', () => {
                        if (permission.state === 'granted') {
                            console.log('Microphone permission granted');
                        } else if (permission.state === 'denied') {
                            mostrarToast('Micrófono bloqueado', 'warning');
                            audioStream = null;
                            microphoneInitialized = false;
                        }
                    });
                } catch (e) {
                    // Permissions API no soportada
                }
            }
        }

        let mediaRecorder = null;
        let audioChunks = [];

        function inicializarReconocimiento() {
            const voiceButton = document.getElementById('voice-button');
            if (voiceButton) {
                voiceButton.addEventListener('click', async () => {
                    console.log('Voice button clicked');

                    // Verificar suscripción antes de permitir grabación
                    if (!verificarSuscripcion()) {
                        mostrarToast('Se requiere suscripción activa. Haga clic en "Pagar Suscripción Mensual" para continuar.', 'warning');
                        return;
                    }

                    if (appState.isListening) {
                        detenerGrabacion();
                    } else {
                        await iniciarGrabacionAlternativa();
                    }
                });
                console.log('Voice button event listener attached successfully');
            } else {
                console.error('Voice button not found in DOM');
            }

            // Verificar estado del micrófono al cargar
            checkMicrophoneStatus();
        }

        async function iniciarGrabacionAlternativa() {
            try {
                if (!microphoneInitialized) {
                    const stream = await initMicrophone();
                    if (!stream) return; // Falló
                }

                appState.isListening = true;
                const btn = document.getElementById('voice-button');
                const header = document.getElementById('transcript-header');
                const el = document.getElementById('transcript');

                if (btn) btn.classList.add('listening');
                if (header) {
                    header.style.display = 'block';
                    header.style.backgroundColor = 'rgba(10, 10, 10, 0.9)';
                    header.style.color = 'white';
                    header.style.padding = '10px';
                    header.style.borderRadius = '10px';
                }
                if (el) el.innerHTML = '<span style="color: #69F0AE; font-weight:bold;">🔊 Escuchando voz... (Toca de nuevo para terminar)</span>';

                // Usamos audioStream ya inicializado
                mediaRecorder = new MediaRecorder(audioStream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    if (el) el.innerHTML = '<span style="color: #DDDDDD;">⏳ Procesando tu voz en la nube... Espera.</span>';

                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();

                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];

                        try {
                            const res = await fetch('/api/voice-transcribe-free', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ audio: base64Audio, mimeType: 'audio/webm' })
                            });

                            if (!res.ok) throw new Error('Falló el API');

                            const data = await res.json();
                            if (data.success && data.transcript) {
                                if (el) el.innerHTML = `<span style="color: #fff;">${data.transcript}</span>`;
                                setTimeout(() => {
                                    if (header) header.style.display = 'none';
                                }, 2000);
                                procesarTranscripcion(data.transcript);
                            } else {
                                throw new Error('Voz no detectada');
                            }
                        } catch (error) {
                            console.error('Error de transcripción:', error);
                            mostrarToast('No se pudo procesar tu voz', 'error');
                            if (el) el.innerHTML = '<span style="color: #fca5a5;">No se pudo entender. Intente de nuevo.</span>';
                            setTimeout(() => {
                                if (header) header.style.display = 'none';
                            }, 3000);
                        }
                    };

                    reader.readAsDataURL(audioBlob);
                };

                mediaRecorder.start();
            } catch (err) {
                console.error('Error al iniciar grabación:', err);
                appState.isListening = false;
                document.getElementById('voice-button').classList.remove('listening');
                mostrarToast('Error accediendo al micrófono', 'error');
            }
        }

        function detenerGrabacion() {
            appState.isListening = false;
            const btn = document.getElementById('voice-button');
            if (btn) btn.classList.remove('listening');

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // ============================================================================
        // PROCESAMIENTO DE TRANSCRIPCIÓN CON FECHAS EXPLÍCITAS
        // ============================================================================

        function procesarTranscripcion(texto) {
            const textoLower = texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const textoOriginal = texto;

            // Extraer información básica
            const info = {
                titulo: texto,
                fecha: null,
                hora: '09:00',
                contexto: 'personal',
                prioridad: 'media'
            };

            const hoy = new Date();
            const anioActual = hoy.getFullYear();

            // =========== DETECCIÓN DE FECHAS ===========

            // 1. Fechas explícitas: "13 de febrero", "el 5 de marzo", "para el 20 de abril"
            const mesesNombres = {
                'enero': 0, 'febrero': 1, 'marzo': 2, 'abril': 3, 'mayo': 4, 'junio': 5,
                'julio': 6, 'agosto': 7, 'septiembre': 8, 'octubre': 9, 'noviembre': 10, 'diciembre': 11
            };

            // Patrón para fechas como "13 de febrero", "el 5 de marzo de 2026"
            const regexFechaExplicita = /(?:el\s+|para\s+el\s+)?(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)(?:\s+(?:del?\s+)?(\d{4}))?/i;
            const matchFecha = textoLower.match(regexFechaExplicita);

            if (matchFecha) {
                const dia = parseInt(matchFecha[1]);
                const mesNombre = matchFecha[2].toLowerCase();
                const mes = mesesNombres[mesNombre];
                let anio = matchFecha[3] ? parseInt(matchFecha[3]) : anioActual;

                // Si la fecha ya pasó este año, usar el próximo año
                const fechaPropuesta = new Date(anio, mes, dia);
                if (fechaPropuesta < hoy && !matchFecha[3]) {
                    anio++;
                }

                // Validar día válido para el mes
                const ultimoDiaMes = new Date(anio, mes + 1, 0).getDate();
                if (dia >= 1 && dia <= ultimoDiaMes) {
                    info.fecha = `${anio}-${(mes + 1).toString().padStart(2, '0')}-${dia.toString().padStart(2, '0')}`;
                }
            }

            // 2. Fechas relativas: hoy, mañana, pasado mañana
            if (!info.fecha) {
                if (/\bhoy\b/i.test(textoLower)) {
                    info.fecha = fechaAString(hoy);
                } else if (/\bpasado\s*manana\b/i.test(textoLower)) {
                    const p = new Date(hoy); p.setDate(p.getDate() + 2);
                    info.fecha = fechaAString(p);
                } else if (/\bmanana\b/i.test(textoLower)) {
                    const m = new Date(hoy); m.setDate(m.getDate() + 1);
                    info.fecha = fechaAString(m);
                }
            }

            // 3. Días de la semana: "el lunes", "este viernes", "próximo martes"
            if (!info.fecha) {
                const diasSemana = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
                const regexDiaSemana = /(?:el\s+|este\s+|proximo\s+)?(domingo|lunes|martes|miercoles|jueves|viernes|sabado)/i;
                const matchDia = textoLower.match(regexDiaSemana);

                if (matchDia) {
                    const diaNombre = matchDia[1].toLowerCase();
                    const diaTarget = diasSemana.indexOf(diaNombre);
                    if (diaTarget !== -1) {
                        let diff = diaTarget - hoy.getDay();
                        if (diff <= 0) diff += 7;
                        const fecha = new Date(hoy);
                        fecha.setDate(fecha.getDate() + diff);
                        info.fecha = fechaAString(fecha);
                    }
                }
            }

            // 4. Formato numérico: "el 15/02", "15-02-2026"
            if (!info.fecha) {
                const regexNumerico = /(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/;
                const matchNum = textoLower.match(regexNumerico);
                if (matchNum) {
                    const dia = parseInt(matchNum[1]);
                    const mes = parseInt(matchNum[2]) - 1;
                    let anio = matchNum[3] ? parseInt(matchNum[3]) : anioActual;
                    if (anio < 100) anio += 2000;

                    const ultimoDiaMes = new Date(anio, mes + 1, 0).getDate();
                    if (dia >= 1 && dia <= ultimoDiaMes && mes >= 0 && mes <= 11) {
                        info.fecha = `${anio}-${(mes + 1).toString().padStart(2, '0')}-${dia.toString().padStart(2, '0')}`;
                    }
                }
            }

            // =========== DETECCIÓN DE HORA ===========
            const regexHora = /a\s*las?\s*(\d{1,2})(?::(\d{2})|(?:\s+y\s+(media|cuarto))?)?(?:\s*(?:de\s*la\s*)?(manana|tarde|noche|am|pm|a\.?m\.?|p\.?m\.?))?/i;
            const horaMatch = textoLower.match(regexHora);
            if (horaMatch) {
                let hora = parseInt(horaMatch[1]);
                let min = 0;

                if (horaMatch[2]) {
                    min = parseInt(horaMatch[2]);
                } else if (horaMatch[3]) {
                    if (horaMatch[3] === 'media') min = 30;
                    else if (horaMatch[3] === 'cuarto') min = 15;
                }

                const periodo = horaMatch[4];
                if (periodo) {
                    if ((periodo.includes('tarde') || periodo.includes('noche') || periodo.startsWith('p')) && hora < 12) {
                        hora += 12;
                    } else if ((periodo.includes('manana') || periodo.startsWith('a')) && hora === 12) {
                        hora = 0;
                    }
                } else if (hora >= 1 && hora <= 6) {
                    // Si no especifica y es hora pequeña, asumir tarde
                    hora += 12;
                }

                info.hora = `${hora.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
            }

            // =========== DETECCIÓN DE PRIORIDAD ===========
            // Prioridad explícita: "prioridad alta", "prioridad baja", "prioridad media"
            if (/prioridad\s+alta|alta\s+prioridad/i.test(textoLower)) {
                info.prioridad = 'alta';
            } else if (/prioridad\s+baja|baja\s+prioridad/i.test(textoLower)) {
                info.prioridad = 'baja';
            } else if (/prioridad\s+media|media\s+prioridad|prioridad\s+normal/i.test(textoLower)) {
                info.prioridad = 'media';
            }
            // Palabras clave implícitas para alta prioridad
            else if (/urgente|muy\s+importante|importante|prioritari|critico|inmediato|cuanto\s+antes/i.test(textoLower)) {
                info.prioridad = 'alta';
            }
            // Palabras clave implícitas para baja prioridad
            else if (/poco\s*urgent|cuando\s*pueda|sin\s*prisa|no\s+es\s+urgente|puede\s+esperar/i.test(textoLower)) {
                info.prioridad = 'baja';
            }

            // =========== DETECCIÓN DE CONTEXTO ===========
            if (/trabajo|oficina|reunion|cliente|proyecto|jefe/i.test(textoLower)) {
                info.contexto = 'trabajo';
            } else if (/familia|hijo|hija|esposa|esposo|padre|madre|casa|hogar/i.test(textoLower)) {
                info.contexto = 'familiar';
            }

            // =========== LIMPIAR Y FORMATEAR TÍTULO ===========
            info.titulo = textoOriginal
                // Remover fechas explícitas
                .replace(/(?:el\s+|para\s+el\s+)?\d{1,2}\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)(?:\s+(?:del?\s+)?\d{4})?/gi, '')
                // Remover fechas numéricas
                .replace(/\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?/g, '')
                // Remover días de la semana
                .replace(/(?:el\s+|este\s+|próximo\s+)?(domingo|lunes|martes|miércoles|jueves|viernes|sábado)/gi, '')
                // Remover referencias temporales
                .replace(/\b(hoy|mañana|pasado\s*mañana)\b/gi, '')
                // Remover horas
                .replace(/a\s*las?\s*\d+(?::\d+)?(?:\s+y\s+(?:media|cuarto))?(?:\s*(?:de\s*la\s*)?(?:mañana|tarde|noche|am|pm|a\.?m\.?|p\.?m\.?))?/gi, '')
                // Remover prioridades explícitas e implícitas
                .replace(/\b(prioridad\s+)?(alta|media|baja|normal)(\s+prioridad)?\b/gi, '')
                .replace(/\b(urgente|muy\s+importante|importante|prioritario|crítico|inmediato|cuanto\s+antes)\b/gi, '')
                .replace(/\b(poco\s*urgente|cuando\s*pueda|sin\s*prisa|no\s+es\s+urgente|puede\s+esperar)\b/gi, '')
                // Remover períodos del día solos
                .replace(/\b(?:de\s*la\s*)?(mañana|tarde|noche)\b/gi, '')
                // Remover palabras de conexión huérfanas
                .replace(/\bpara\s+el?\s*$/gi, '')
                .replace(/^\s*el\s+/gi, '')
                // Limpiar espacios múltiples
                .replace(/\s+/g, ' ')
                .trim();

            // Capitalizar primera letra
            if (info.titulo) {
                info.titulo = info.titulo.charAt(0).toUpperCase() + info.titulo.slice(1);
            }

            // Si el título quedó muy corto o vacío
            if (!info.titulo || info.titulo.length < 3) {
                info.titulo = 'Nueva tarea';
            }

            // Si no hay fecha, pedir clarificación
            if (!info.fecha) {
                hablar('No detecté la fecha. Por favor diga la fecha, por ejemplo: "13 de febrero" o "mañana"');
                document.getElementById('voice-status').textContent = 'Diga la fecha de la tarea';
                return;
            }

            // Navegar al mes/año de la fecha
            const fechaParts = info.fecha.split('-');
            appState.year = parseInt(fechaParts[0]);
            appState.month = parseInt(fechaParts[1]) - 1;
            appState.selectedDate = info.fecha;

            // Mostrar confirmación
            mostrarConfirmacion(info);
        }

        function mostrarConfirmacion(info) {
            const dialog = document.getElementById('confirmation-dialog');
            const fecha = new Date(info.fecha + 'T12:00:00');

            dialog.innerHTML = `
    <div class="confirmation-content">

        </div>
        <div class="confirmation-row">

  `;

            dialog.classList.add('active');

            document.getElementById('btn-cancel').onclick = () => dialog.classList.remove('active');

                    estado: 'Pendiente',
                    creadaEn: new Date().toISOString()
                };
                dialog.classList.remove('active');
                const guardado = await agregarTarea(tarea);
                if (guardado) {
                    mostrarToast('✅ Tarea guardada correctamente', 'success');
                    hablar('Tarea guardada correctamente.');
                } else {
                    mostrarToast('⚠️ Error al guardar la tarea. Intente de nuevo.', 'error');
                    hablar('Hubo un error al guardar la tarea.');
                }
            };

            hablar(`He entendido: ${info.titulo}. ¿Desea confirmarla?`);
        }

        // ============================================================================
        // SÍNTESIS DE VOZ HUMANIZADA
        // ============================================================================

        function hablar(texto, opciones = {}) {
            if (!('speechSynthesis' in window)) {
                console.warn('Síntesis de voz no soportada');
                return;
            }

            // Cancelar cualquier habla en curso
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(texto);

            // Buscar voz preferida
            const voces = speechSynthesis.getVoices();
            const prioridades = ['Helena', 'Sabina', 'Paulina', 'Monica', 'Google español'];
            let vozSeleccionada = voces.find(v =>
                prioridades.some(p => v.name.toLowerCase().includes(p.toLowerCase())) ||
                v.lang === 'es-CO' || v.lang === 'es-MX'
            ) || voces.find(v => v.lang.startsWith('es')) || voces[0];

            // Configuración humanizada
            utterance.voice = vozSeleccionada;
            utterance.lang = 'es-CO';
            utterance.rate = opciones.rate || 0.92; // Más lento y natural
            utterance.pitch = opciones.pitch || 1.05; // Tono ligeramente amigable
            utterance.volume = opciones.volume || 1.0;

            // Pequeñas variaciones para sonar más natural
            utterance.rate += (Math.random() * 0.08) - 0.04; // ±0.04
            utterance.pitch += (Math.random() * 0.06) - 0.03; // ±0.03

            speechSynthesis.speak(utterance);
        }

        window.marcarCumplida = async function (id) {
            // Optimistic UI: update local state immediately
            const tarea = appState.tareas.find(t => t.id === id);
            const estadoAnterior = tarea ? tarea.estado : 'Pendiente';
            if (tarea) {
                tarea.estado = 'Cumplida';
                tarea.actualizadaEn = new Date().toISOString();
            }
            renderizarListaTareas();
            renderizarListaCumplidas();
            renderizarCalendario();

            if (exito) {
                mostrarToast('Tarea marcada como cumplida', 'success');
            } else {
                // Revert optimistic update on failure
                if (tarea) {
                    tarea.estado = estadoAnterior;
                    delete tarea.actualizadaEn;
                }
                renderizarListaTareas();
                renderizarListaCumplidas();
                renderizarCalendario();
                mostrarToast('Error al actualizar la tarea. Intente de nuevo.', 'error');

        window.eliminarTarea = async function (id) {

                // Optimistic UI: Eliminar visualmente primero

                        Para eliminar esta tarea, ingrese la contraseña de administrador.
                    </div>
                    <div style="position: relative; margin-bottom: 16px;">
                        <input type="password" id="delete-password-input" placeholder="Ingrese la contraseña" autocomplete="off" style="
                            width: 100%;
                            padding: 12px 44px 12px 16px;
                            border: 2px solid rgba(255, 255, 255, 0.1);
                            border-radius: 10px;
                            background: rgba(255, 255, 255, 0.05);
                            color: #fff;
                            font-size: 1rem;
                            transition: all 0.3s ease;
                            box-sizing: border-box;
                        ">
                        <button type="button" id="toggle-password-btn" style="
                            position: absolute;
                            right: 12px;
                            top: 50%;
                            transform: translateY(-50%);
                            background: none;
                            border: none;
                            color: #a0aec0;
                            cursor: pointer;
                            font-size: 1.2rem;
                            padding: 4px;
                        ">👁️</button>
                    </div>
                    <div id="password-error-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: -12px; margin-bottom: 16px; display: none;">
                        ❌ Contraseña incorrecta. Intente nuevamente.
                    </div>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button id="cancel-delete-btn" style="
                            padding: 10px 20px;
                            border-radius: 8px;
                            font-weight: 500;
                            cursor: pointer;
                            transition: all 0.2s ease;
                            border: none;
                            font-size: 0.9rem;
                            background: rgba(255, 255, 255, 0.1);
                            color: #a0aec0;
                        ">Cancelar</button>
                        <button id="confirm-delete-btn" style="
                            padding: 10px 20px;
                            border-radius: 8px;
                            font-weight: 500;
                            cursor: pointer;
                            transition: all 0.2s ease;
                            border: none;
                            font-size: 0.9rem;
                            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
                            color: #fff;
                        ">Eliminar</button>
                    </div>
                `;

                overlay.appendChild(modal);
                document.body.appendChild(overlay);

                // Referencias a elementos
                const passwordInput = modal.querySelector('#delete-password-input');
                const toggleBtn = modal.querySelector('#toggle-password-btn');
                const cancelBtn = modal.querySelector('#cancel-delete-btn');
                const confirmBtn = modal.querySelector('#confirm-delete-btn');
                const errorMsg = modal.querySelector('#password-error-msg');

                // Focus en el input
                setTimeout(() => passwordInput.focus(), 100);

                // Toggle visibilidad de contraseña
                toggleBtn.addEventListener('click', () => {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    toggleBtn.textContent = isPassword ? '🙈' : '👁️';
                });

                // Función para cerrar el modal
                const cerrarModal = () => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 200);
                };

                // Cancelar
                cancelBtn.addEventListener('click', () => {
                    cerrarModal();
                    resolve(false);
                });

                // Click fuera del modal para cancelar
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        cerrarModal();
                        resolve(false);
                    }
                });

                // Confirmar eliminación
                const verificarContrasena = () => {
                    const PASSWORD_CORRECTA = 'controltotal';
                    const inputValue = passwordInput.value;

                    if (inputValue === PASSWORD_CORRECTA) {
                        cerrarModal();
                        resolve(true);
                    } else {
                        passwordInput.style.borderColor = '#ef4444';
                        passwordInput.style.animation = 'shake 0.4s ease-in-out';
                        errorMsg.style.display = 'block';
                        passwordInput.value = '';
                        passwordInput.focus();

                        // Remover animación después de ejecutarse
                        setTimeout(() => {
                            passwordInput.style.animation = '';
                        }, 400);
                    }
                };

                confirmBtn.addEventListener('click', verificarContrasena);

                // Enter para confirmar, Escape para cancelar
                passwordInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        verificarContrasena();
                    } else if (e.key === 'Escape') {
                        cerrarModal();
                        resolve(false);
                    }
                });
            });
        }

        /**
         * Abre el modal de edición para una tarea específica
         * @param {string} id - ID de la tarea a modificar
         */
        window.abrirModalEdicion = function (id) {
            const tarea = appState.tareas.find(t => t.id === id);
            if (!tarea) {
                mostrarToast('Tarea no encontrada', 'error');
                return;
            }

            const dialog = document.getElementById('confirmation-dialog');

            dialog.innerHTML = `
    <div class="confirmation-content" style="max-width: 520px;">
      <h2 class="confirmation-title">✏️ Modificar Tarea</h2>
      <form id="form-edicion" style="display: flex; flex-direction: column; gap: var(--space-4);">
        <div class="form-group">
          <label class="form-label" for="edit-titulo">Texto de la tarea:</label>
          <input type="text" id="edit-titulo" class="form-input" value="${tarea.titulo}" required 
            style="color: var(--color-gray-800); background: var(--color-white);">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
          <div class="form-group">
            <label class="form-label" for="edit-fecha">Fecha:</label>
            <input type="date" id="edit-fecha" class="form-input" value="${tarea.fecha}" required
              style="color: var(--color-gray-800); background: var(--color-white);">
          </div>
          <div class="form-group">
            <label class="form-label" for="edit-hora">Hora:</label>
            <input type="time" id="edit-hora" class="form-input" value="${tarea.hora}" required
              style="color: var(--color-gray-800); background: var(--color-white);">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-prioridad">Prioridad:</label>
          <select id="edit-prioridad" class="form-input form-select" 
            style="color: var(--color-gray-800); background: var(--color-white);">
            <option value="baja" ${tarea.prioridad === 'baja' ? 'selected' : ''}>🟢 Baja</option>
            <option value="media" ${tarea.prioridad === 'media' ? 'selected' : ''}>🟡 Media</option>
            <option value="alta" ${tarea.prioridad === 'alta' ? 'selected' : ''}>🔴 Alta</option>
          </select>
        </div>
        <input type="hidden" id="edit-tarea-id" value="${id}">
      </form>
      <div class="confirmation-actions" style="margin-top: var(--space-6);">
        <button class="btn btn-secondary" onclick="cerrarModalEdicion()">Cancelar</button>
        <button class="btn btn-success" onclick="guardarEdicionTarea()">💾 Guardar Cambios</button>
      </div>
    </div>
  `;

            dialog.classList.add('active');

            // Enfocar el campo de título
            setTimeout(() => {
                document.getElementById('edit-titulo').focus();
                document.getElementById('edit-titulo').select();
            }, 100);
        };

        /**
         * Guarda los cambios realizados en el modal de edición
         */
        window.guardarEdicionTarea = async function () {
            const id = document.getElementById('edit-tarea-id').value;
            const titulo = document.getElementById('edit-titulo').value.trim();
            const fecha = document.getElementById('edit-fecha').value;
            const hora = document.getElementById('edit-hora').value;
            const prioridad = document.getElementById('edit-prioridad').value;

            // Validar campos
            if (!titulo) {
                mostrarToast('El texto de la tarea no puede estar vacío', 'error');
                document.getElementById('edit-titulo').focus();
                return;
            }

            if (!fecha) {
                mostrarToast('La fecha es requerida', 'error');
                document.getElementById('edit-fecha').focus();
                return;
            }

            if (!hora) {
                mostrarToast('La hora es requerida', 'error');
                document.getElementById('edit-hora').focus();
                return;
            }

            // Mostrar estado de carga (opcionalmente deshabilitar botón)
            const btnGuardar = document.querySelector('#confirmation-dialog .btn-success');
            const txtOriginal = btnGuardar ? btnGuardar.innerText : 'Guardar';
            if (btnGuardar) {
                btnGuardar.innerText = 'Guardando...';
                btnGuardar.disabled = true;
            }

            // Actualizar la tarea
            const exito = await actualizarTarea(id, {
                titulo: titulo,
                fecha: fecha,
                hora: hora,
                prioridad: prioridad,
                estado: 'Pendiente' // Reactivar tarea al editar
            });

            if (btnGuardar) {
                btnGuardar.innerText = txtOriginal;
                btnGuardar.disabled = false;
            }

            if (exito) {
                // Reactivar notificación: eliminar de la lista de tareas ya alertadas
                if (tareasAlertadas.has(id)) {
                    tareasAlertadas.delete(id);
                    localStorage.setItem('tareasAlertadas', JSON.stringify(Array.from(tareasAlertadas)));
                    console.log('Notificación reprogramada para la tarea modificada');
                }

                // Cerrar modal y actualizar UI
                cerrarModalEdicion();
                // onSnapshot se encargará del renderizado final, pero podemos forzar uno local si quisiéramos
                // Como actualizarTarea no devuelve la tarea actualizada, esperamos a onSnapshot o 
                // confiamos en que onSnapshot llegará rápido.

                mostrarToast('Tarea modificada correctamente', 'success');
            } else {
                mostrarToast('Hubo un error al guardar los cambios', 'error');
            }
        };

        /**
         * Cierra el modal de edición
         */
        window.cerrarModalEdicion = function () {
            const dialog = document.getElementById('confirmation-dialog');
            dialog.classList.remove('active');
        };

        // ============================================================================
        // SÍNTESIS DE VOZ HUMANIZADA
        // ============================================================================

        let vozPreferida = null;

        function cargarVozHumanizada() {
            const voces = speechSynthesis.getVoices();
            // Preferir voces en español, idealmente de Colombia o naturalales
            const prioridades = [
                'Microsoft Helena',
                'Microsoft Sabina',
                'Google español',
                'Paulina',
                'Monica',
                'es-CO',
                'es-MX',
                'es-ES'
            ];

            for (const prioridad of prioridades) {
                const voz = voces.find(v =>
                    v.name.toLowerCase().includes(prioridad.toLowerCase()) ||
                    v.lang.toLowerCase().includes(prioridad.toLowerCase())
                );
                if (voz) {
                    vozPreferida = voz;
                    console.log('Voz seleccionada:', voz.name, voz.lang);
                    return;
                }
            }

            // Si no hay voz específica, usar la primera en español
            vozPreferida = voces.find(v => v.lang.startsWith('es')) || voces[0];
            if (vozPreferida) {
                console.log('Voz por defecto:', vozPreferida.name);
            }
        }

        /**
         * Habla un texto con voz humanizada
         * @param {string} texto - Texto a hablar
         * @param {object} opciones - Opciones de voz
         */
        function hablar(texto, opciones = {}) {
            if (!('speechSynthesis' in window)) {
                console.warn('Síntesis de voz no soportada');
                return;
            }

            // Cancelar cualquier habla en curso
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(texto);

            // Configuración humanizada
            utterance.voice = vozPreferida;
            utterance.lang = 'es-CO';
            utterance.rate = opciones.rate || 0.95; // Un poco más lento que normal
            utterance.pitch = opciones.pitch || 1.1; // Tono ligeramente más alto (más amigable)
            utterance.volume = opciones.volume || 1.0;

            // Pequeñas variaciones para sonar más natural
            utterance.rate += (Math.random() * 0.1) - 0.05; // ±0.05
            utterance.pitch += (Math.random() * 0.1) - 0.05; // ±0.05

            speechSynthesis.speak(utterance);
        }

        /**
         * Habla una confirmación amigable
         */
        function hablarConfirmacion(titulo, fecha, hora) {
            const mensajes = [
                `Listo, he registrado ${titulo}`,
                `Perfecto, tarea anotada: ${titulo}`,
                `Entendido, ${titulo} ha sido guardada`,
                `De acuerdo, he creado la tarea ${titulo}`
            ];
            const mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];

            setTimeout(() => {
                hablar(mensaje);
            }, 300);
        }

        /**
         * Habla un saludo o mensaje de estado
         */
        function hablarEstado(tipo) {
            const mensajes = {
                escuchando: [
                    'Te escucho',
                    'Dime',
                    'Sí, cuéntame'
                ],
                noEntendi: [
                    'No entendí bien, ¿podrías repetir?',
                    'Perdona, ¿puedes decirlo de nuevo?',
                    'No capté eso, intenta otra vez'
                ],
                alarma: [
                    'Atención, tienes una tarea pendiente',
                    'Recordatorio importante',
                    'Es hora de tu tarea'
                ]
            };

            const opciones = mensajes[tipo];
            if (opciones) {
                const mensaje = opciones[Math.floor(Math.random() * opciones.length)];
                hablar(mensaje);
            }
        }

        // ============================================================================
        // NOTIFICACIONES
        // ============================================================================

        function mostrarToast(mensaje, tipo = 'info') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const iconos = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };

            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.innerHTML = `
    <span style="font-size: var(--font-size-xl);">${iconos[tipo]}</span>
    <p style="flex: 1;">${mensaje}</p>
    <button onclick="this.parentElement.remove()" style="background: none; border: none; cursor: pointer; color: var(--color-gray-400);">×</button>
  `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ============================================================================
        // INICIALIZACIÓN
        // ============================================================================

        document.addEventListener('DOMContentLoaded', async () => {
            // ============================================================================
            // FIREBASE AUTH STATE OBSERVER
            // ============================================================================

            if (auth) {
                // Usar Firebase Auth compat (cargado vía CDN)
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        // Usuario autenticado
                        currentUser = user;
                        console.log('👤 Usuario autenticado:', user.displayName || user.email);

                        // Iniciar sincronización en tiempo real
                        iniciarListenerTareas();

                        // Intentar sincronizar tareas pendientes guardadas offline
                        // Esto asegura que si hubo fallos previos, se reintente al reconectar/reloguear
                        await sincronizarTareasPendientes();

                        // Migrar tareas de colección vieja (usuarios → users)
                        await migrarTareasDesdeColeccionVieja();

                        // Cargar suscripción del usuario desde Firestore
                        await cargarSuscripcionFirestore();

                        // Migrar tareas locales si las hay
                        await migrarTareasLocales();

                        // Continuar con inicialización normal de la app
                        await inicializarAppAutenticada();
                    } else {
                        // Usuario no autenticado
                        currentUser = null;
                        detenerListenerTareas();
                        appState.tareas = [];
                        suscripcionCache = null;
                        renderizarLogin();
                    }
                });
            } else {
                // Firebase no configurado - usar modo local
                console.log('⚠️ Firebase no configurado. Usando almacenamiento local.');
                cargarTareas();
                await inicializarAppAutenticada();
            }
        });

        /**
         * Inicializa la app después de verificar autenticación
         */
        async function inicializarAppAutenticada() {
            // Sincronizar con Hora Legal de Colombia
            console.log('⏰ Sincronizando con Hora Legal de Colombia...');
            await sincronizarHoraOficial();

            // Cargar suscripción del usuario desde Firestore
            if (currentUser) {
                console.log('📋 Cargando suscripción del usuario...');
                await cargarSuscripcionFirestore();
            }

            // Detectar si regresa de un pago exitoso
            detectarRetornoPago();

            // Establecer fecha inicial usando hora sincronizada de Colombia
            const hoy = obtenerHoraColombiana();
            if (hoy.getFullYear() >= 2026 && hoy.getFullYear() <= 2050) {
                appState.year = hoy.getFullYear();
                appState.month = hoy.getMonth();
            }

            renderizarApp();

            // Iniciar verificación de suscripción
            iniciarVerificacionSuscripcion();

            // Cargar voces humanizadas
            if ('speechSynthesis' in window) {
                const cargarVoces = () => {
                    const voces = speechSynthesis.getVoices();
                    if (voces.length > 0) {
                        cargarVozHumanizada();
                    }
                };
                cargarVoces();
                speechSynthesis.onvoiceschanged = cargarVoces;
            }

            // Iniciar sistema de alarmas
            cargarTareasAlertadas();
            verificarAlarmas();
            // Verificar alarma inicial
            verificarAlarmas();
            // Intervalo eliminado: se verifica cada segundo en actualizarReloj()

            console.log('%c🎙️ Asistente de Voz Colombiano', 'font-size: 20px; color: #6366f1; font-weight: bold;');
            console.log('Zona horaria: America/Bogota (UTC-5)');
            console.log('Referencia oficial: https://horalegal.inm.gov.co/');
            console.log('Estado de sincronización:', isSynced ? '✅ Sincronizado' : '⚠️ Usando hora estimada');
            console.log('Suscripción:', verificarSuscripcion() ? `✅ Activa (${obtenerDiasRestantes()} días restantes)` : '❌ Inactiva');
            console.log('Sistema de alarmas: Activo ✓');
            console.log('Usuario:', currentUser ? `✅ ${currentUser.displayName || currentUser.email}` : '❌ No autenticado (modo local)');
        }

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registrado:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('❌ Service Worker error:', error);
                    });
            });
        }
    </script>
    <script>
        // Bloquear Vercel Toolbar y Feedback en producción
        (function () {
            const clean = () => {
                try {
                    const selector = 'vercel-live-feedback, #vercel-toolbar, .vercel-toolbar, [data-vercel-toolbar]';
                    const els = document.querySelectorAll(selector);
                    if (els.length > 0) {
                        els.forEach(el => el.remove());
                        console.log('Blocked Vercel Toolbar');
                    }
                } catch (e) { }
            };

            // Ejecutar inmediatamente
            clean();

            // Observar cambios en el DOM para eliminar si se inyecta
            const obs = new MutationObserver(clean);
            obs.observe(document.documentElement, { childList: true, subtree: true });

            window.addEventListener('load', clean);
        })();
    </script>
